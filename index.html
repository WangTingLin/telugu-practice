<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰盧固語聽說練習</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#2E75B6;--pri-d:#1a5a8f;--bg:#f5f7fa;--card:#fff;--text:#333;--muted:#888;--border:#e0e4ea;--success:#27ae60;--danger:#e74c3c;--warn:#f39c12}
body{font-family:'Microsoft JhengHei','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:16px}

/* Header */
header{text-align:center;padding:24px 0 16px;border-bottom:2px solid var(--pri)}
header h1{font-size:1.8em;color:var(--pri)}
header p{color:var(--muted);margin-top:4px}

/* Navigation */
nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:16px 0;border-bottom:1px solid var(--border)}
nav button{padding:8px 14px;border:2px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:.85em;transition:.2s}
nav button:hover{border-color:var(--pri);color:var(--pri)}
nav button.active{background:var(--pri);color:#fff;border-color:var(--pri)}

/* Mode selector */
.modes{display:flex;gap:12px;justify-content:center;padding:16px 0}
.modes button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:1em;font-weight:bold;transition:.2s}
.modes button.m-flash{background:#e8f4fd;color:var(--pri)}
.modes button.m-dialog{background:#fef3e2;color:#e67e22}
.modes button.m-quiz{background:#eafaf1;color:var(--success)}
.modes button.m-listen{background:#fde8e8;color:var(--danger)}
.modes button.active{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* Card area */
.card-area{padding:20px 0;min-height:400px}

/* Flashcard */
.flashcard{background:var(--card);border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:40px;text-align:center;cursor:pointer;user-select:none;transition:.3s;position:relative;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.flashcard:hover{box-shadow:0 6px 24px rgba(0,0,0,.12)}
.flashcard .label{font-size:.8em;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.flashcard .main{font-size:2em;font-weight:bold;margin:12px 0}
.flashcard .sub{font-size:1.2em;color:var(--muted);margin:8px 0}
.flashcard .reveal{font-size:1.4em;color:var(--pri);margin:12px 0}
.flashcard .hint{font-size:.85em;color:var(--muted);position:absolute;bottom:16px}
.flashcard .counter{position:absolute;top:16px;right:20px;font-size:.8em;color:var(--muted)}

/* Controls */
.controls{display:flex;gap:12px;justify-content:center;padding:16px 0}
.controls button{padding:12px 28px;border:none;border-radius:8px;cursor:pointer;font-size:1em;font-weight:bold;transition:.2s}
.btn-prev{background:#e0e4ea;color:var(--text)}
.btn-next{background:var(--pri);color:#fff}
.btn-speak{background:var(--warn);color:#fff}
.btn-shuffle{background:#9b59b6;color:#fff}
.controls button:hover{opacity:.85;transform:translateY(-1px)}
.controls button:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Dialogue */
.dialogue{background:var(--card);border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:24px;margin-bottom:16px}
.dialogue h3{color:var(--pri);margin-bottom:16px;font-size:1.1em}
.d-line{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:.2s}
.d-line:last-child{border-bottom:none}
.d-line:hover{background:#f8f9fb;border-radius:8px;padding-left:8px}
.d-speaker{font-weight:bold;color:var(--pri);margin-right:8px}
.d-roman{font-style:italic}
.d-approx{color:var(--muted);font-size:.9em}
.d-trans{color:var(--pri);font-size:.9em;margin-top:4px;padding-left:24px;display:none}
.d-line.show .d-trans{display:block}

/* Quiz */
.quiz{background:var(--card);border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:32px;text-align:center}
.quiz .q-prompt{font-size:1.6em;font-weight:bold;margin:16px 0}
.quiz .q-sub{color:var(--muted);margin-bottom:24px}
.quiz .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:600px;margin:0 auto}
.quiz .opt{padding:16px;border:2px solid var(--border);border-radius:12px;cursor:pointer;font-size:1em;transition:.2s;background:var(--card)}
.quiz .opt:hover{border-color:var(--pri);background:#f0f7ff}
.quiz .opt.correct{border-color:var(--success);background:#eafaf1;color:var(--success)}
.quiz .opt.wrong{border-color:var(--danger);background:#fde8e8;color:var(--danger)}
.quiz .score{font-size:1.2em;margin:16px 0;color:var(--pri)}
.quiz .result{margin-top:16px;font-size:1.1em;min-height:2em}

/* Listen mode */
.listen{background:var(--card);border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:32px;text-align:center}
.listen .prompt{font-size:1.1em;color:var(--muted);margin-bottom:16px}
.listen .target{font-size:1.8em;font-weight:bold;margin:16px 0}
.listen .approx{font-size:1.2em;color:var(--muted)}
.listen .speak-btn{padding:20px 40px;border:none;border-radius:50%;cursor:pointer;font-size:2em;background:var(--danger);color:#fff;margin:24px 0;transition:.2s;display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px}
.listen .speak-btn:hover{transform:scale(1.1)}
.listen .speak-btn.recording{background:#c0392b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 16px rgba(231,76,60,0)}}
.listen .feedback{font-size:1.1em;min-height:2em;margin-top:12px}

/* Stats bar */
.stats{display:flex;gap:16px;justify-content:center;padding:8px 0;font-size:.85em;color:var(--muted)}
.stats span{background:var(--card);padding:4px 12px;border-radius:12px;border:1px solid var(--border)}

/* Progress bar */
.progress{height:4px;background:var(--border);border-radius:2px;margin:8px 0;overflow:hidden}
.progress .bar{height:100%;background:var(--pri);transition:.3s;border-radius:2px}

/* TTS indicator */
.tts-note{text-align:center;font-size:.8em;color:var(--muted);padding:4px 0}

/* Responsive */
@media(max-width:600px){
  .flashcard .main{font-size:1.5em}
  .quiz .options{grid-template-columns:1fr}
  nav button{font-size:.75em;padding:6px 10px}
  .modes button{padding:8px 14px;font-size:.85em}
}
</style>
</head>

      {roman:"nāku kaḍupu nōppigā undi",approx:"那庫 卡杜噗 諾皮嘎 溫迪",zh:"我肚子痛",ex:"症狀",te:"నాకు కడుపు నొప్పిగా ఉంది"},
      {roman:"nēnu dāri tappipōyānu",approx:"內努 達利 塔皮波亞努",zh:"我迷路了",ex:"求助",te:"నేను దారి తప్పిపోయాను"},
      {roman:"nā ___ potundi",approx:"那 ___ 波吞迪",zh:"我的___丟了",ex:"失物",te:"నా పోతుంది"},
      {roman:"donga!",approx:"東嘎！",zh:"小偷！",ex:"緊急",te:"దొంగ"},
    ],
    dialogues: [
      {title:"在藥局",lines:[
        {s:"你",r:"Nāku ōllu baagalēdu.",a:"那庫 歐盧 巴嘎累杜",t:"我身體不舒服。",te:"నాకు ఒళ్ళు బాగాలేదు"},
        {s:"藥師",r:"Ēmi ayyindi?",a:"欸咪 愛因迪？",t:"怎麼了？",te:"ఏమి అయ్యింది?"},
        {s:"你",r:"Jvaram undi, tala nōppigā undi.",a:"基瓦拉姆 溫迪，塔拉 諾皮嘎 溫迪",t:"發燒，頭也痛。",te:"జ్వరం ఉంది, తల నొప్పిగా ఉంది"},
        {s:"藥師",r:"Paracetamol teesukōndi. Rōjuki mūdu sārlu.",a:"帕拉希塔莫 帝蘇扣恩迪。肉朱基 木杜 薩路",t:"吃撲熱息痛。一天三次。",te:"పారాసెటమాల్ తీసుకోండి. రోజుకి మూడు సార్లు"},
      ]},
      {title:"迷路求助",lines:[
        {s:"你",r:"Nēnu dāri tappipōyānu. Help chēyandi.",a:"內努 達利 塔皮波亞努。黑爾普 切楊迪",t:"我迷路了。請幫忙。",te:"నేను దారి తప్పిపోయాను. హెల్ప్ చేయండి"},
        {s:"路人",r:"Ekkadiki vellāli?",a:"欸卡迪基 威拉力？",t:"要去哪裡？",te:"ఎక్కడికి వెళ్ళాలి?"},
        {s:"你",r:"Nā hotel ki. Hotel Taj.",a:"那 哈帖爾 基。哈帖爾 塔基",t:"去我的旅館。Taj旅館。",te:"నా హోటల్ కి. హోటల్ తాజ్"},
        {s:"路人",r:"Dāggare. Nēnu chūpistānu, randi.",a:"達嘎蕊。內努 丘皮斯塔努，蘭迪",t:"很近。我帶你去，跟我來。",te:"దగ్గరే. నేను చూపిస్తాను, రండి"},
      ]},
    ]
  },
];

// ==================== STATE ====================
let currentLesson = 0;
let currentMode = 'flash'; // flash, dialog, quiz, listen
let cardIndex = 0;
let revealed = false;
let shuffled = false;
let quizScore = 0;
let quizTotal = 0;
let quizAnswered = false;
let speechSynth = window.speechSynthesis;
let recognition = null;
let vocabOrder = [];

// ==================== TTS ====================
function speak(text) {
  if (!speechSynth) return;
  speechSynth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'te-IN';
  u.rate = 0.8;
  const voices = speechSynth.getVoices();
  const teVoice = voices.find(v => v.lang.startsWith('te'));
  if (teVoice) u.voice = teVoice;
  speechSynth.speak(u);
}

function checkTTS() {
  const voices = speechSynth ? speechSynth.getVoices() : [];
  const hasTe = voices.some(v => v.lang.startsWith('te'));
  const note = document.getElementById('ttsNote');
  if (hasTe) {
    note.textContent = '🔊 已偵測到泰盧固語語音引擎，點擊「朗讀」按鈕可聽發音';
  } else {
    note.textContent = '💡 提示：安裝 Google Chrome 並啟用泰盧固語語音套件可獲得更好的聽力體驗';
  }
}

if (speechSynth) {
  speechSynth.onvoiceschanged = checkTTS;
  setTimeout(checkTTS, 500);
}

// ==================== RENDER ====================
function renderNav() {
  const nav = document.getElementById('lessonNav');
  nav.innerHTML = lessons.map((l, i) =>
    `<button class="${i === currentLesson ? 'active' : ''}" onclick="switchLesson(${i})">${l.title}</button>`
  ).join('');
}

function renderModes() {
  const bar = document.getElementById('modeBar');
  const modes = [
    {id:'flash',label:'📇 單字卡',cls:'m-flash'},
    {id:'dialog',label:'💬 情境對話',cls:'m-dialog'},
    {id:'quiz',label:'🎯 測驗',cls:'m-quiz'},
    {id:'listen',label:'🎤 跟讀',cls:'m-listen'},
  ];
  bar.innerHTML = modes.map(m =>
    `<button class="${m.cls} ${m.id === currentMode ? 'active' : ''}" onclick="switchMode('${m.id}')">${m.label}</button>`
  ).join('');
}

function getVocab() {
  const v = lessons[currentLesson].vocab;
  if (!shuffled || vocabOrder.length !== v.length) {
    vocabOrder = v.map((_, i) => i);
  }
  return vocabOrder.map(i => v[i]);
}

function renderFlashcard() {
  const vocab = getVocab();
  if (!vocab.length) { document.getElementById('cardArea').innerHTML = '<p>此課無單字卡</p>'; return; }
  const item = vocab[cardIndex % vocab.length];
  const total = vocab.length;
  const idx = cardIndex % total;
  document.getElementById('progressBar').style.width = ((idx + 1) / total * 100) + '%';
  document.getElementById('statsBar').innerHTML = `<span>第 ${idx + 1} / ${total} 張</span>`;

  const area = document.getElementById('cardArea');
  area.innerHTML = `
    <div class="flashcard" onclick="flipCard()">
      <div class="counter">${idx + 1}/${total}</div>
      <div class="label">中文意思</div>
      <div class="main">${item.zh}</div>
      <div class="sub">${item.ex}</div>
      ${revealed ? `
        <div style="border-top:1px dashed #ddd;width:80%;margin:12px 0"></div>
        <div class="label">泰盧固語</div>
        <div class="reveal">${item.roman}</div>
        <div class="sub">（${item.approx}）</div>
      ` : `<div class="hint">👆 點擊翻面查看答案</div>`}
    </div>`;

  const ctrl = document.getElementById('controlBar');
  ctrl.innerHTML = `
    <button class="btn-prev" onclick="prevCard()" ${idx === 0 ? 'disabled' : ''}>⬅ 上一張</button>
    <button class="btn-speak" onclick="speak('${item.te}')">🔊 朗讀</button>
    <button class="btn-shuffle" onclick="toggleShuffle()">${shuffled ? '🔢 順序' : '🔀 隨機'}</button>
    <button class="btn-next" onclick="nextCard()">下一張 ➡</button>`;
}

function renderDialogue() {
  const dialogs = lessons[currentLesson].dialogues;
  const area = document.getElementById('cardArea');
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('statsBar').innerHTML = `<span>${dialogs.length} 段對話</span><span>點擊每行顯示翻譯</span>`;

  area.innerHTML = dialogs.map(d => `
    <div class="dialogue">
      <h3>🎭 ${d.title}</h3>
      ${d.lines.map((l, i) => `
        <div class="d-line" onclick="this.classList.toggle('show')">
          <span class="d-speaker">${l.s}：</span>
          <span class="d-roman">${l.r}</span>
          <span class="d-approx">（${l.a}）</span>
          <span style="cursor:pointer;margin-left:8px" onclick="event.stopPropagation();speak('${l.te}')">🔊</span>
          <div class="d-trans">→ ${l.t}</div>
        </div>
      `).join('')}
      <div style="text-align:center;margin-top:12px">
        <button onclick="toggleAllLines(this)" style="padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;font-size:.85em">顯示/隱藏全部翻譯</button>
      </div>
    </div>
  `).join('');

  document.getElementById('controlBar').innerHTML = '';
}

function renderQuiz() {
  const vocab = lessons[currentLesson].vocab;
  if (vocab.length < 4) { document.getElementById('cardArea').innerHTML = '<p>此課單字不足，無法測驗</p>'; return; }

  const idx = cardIndex % vocab.length;
  const correct = vocab[idx];
  document.getElementById('progressBar').style.width = ((quizTotal > 0 ? quizTotal : 1) / vocab.length * 100) + '%';
  document.getElementById('statsBar').innerHTML = `<span>答對 ${quizScore} / ${quizTotal}</span><span>正確率 ${quizTotal ? Math.round(quizScore/quizTotal*100) : 0}%</span>`;

  // Generate 4 options with correct answer
  let options = [correct];
  let pool = vocab.filter((_, i) => i !== idx);
  while (options.length < 4 && pool.length > 0) {
    const ri = Math.floor(Math.random() * pool.length);
    options.push(pool.splice(ri, 1)[0]);
  }
  // Shuffle options
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  const area = document.getElementById('cardArea');
  area.innerHTML = `
    <div class="quiz">
      <div class="q-sub">這個泰盧固語是什麼意思？</div>
      <div class="q-prompt">${correct.roman}</div>
      <div class="q-sub">（${correct.approx}）</div>
      <div class="options">
        ${options.map(o => `
          <div class="opt" onclick="checkQuiz(this,'${o.zh.replace(/'/g,"\\'")}','${correct.zh.replace(/'/g,"\\'")}')">
            ${o.zh}
          </div>
        `).join('')}
      </div>
      <div class="result" id="quizResult"></div>
    </div>`;

  document.getElementById('controlBar').innerHTML = `
    <button class="btn-speak" onclick="speak('${correct.te}')">🔊 朗讀</button>
    <button class="btn-next" onclick="nextQuiz()" id="nextQuizBtn" disabled>下一題 ➡</button>`;
}

function renderListen() {
  const vocab = lessons[currentLesson].vocab;
  if (!vocab.length) { document.getElementById('cardArea').innerHTML = '<p>此課無練習詞彙</p>'; return; }
  const idx = cardIndex % vocab.length;
  const item = vocab[idx];
  document.getElementById('progressBar').style.width = ((idx + 1) / vocab.length * 100) + '%';
  document.getElementById('statsBar').innerHTML = `<span>第 ${idx + 1} / ${vocab.length} 個</span>`;

  const area = document.getElementById('cardArea');
  area.innerHTML = `
    <div class="listen">
      <div class="prompt">先聽發音，然後跟著大聲說出來：</div>
      <div class="target">${item.roman}</div>
      <div class="approx">（${item.approx}）</div>
      <div style="margin-top:8px;color:var(--pri)">${item.zh}</div>
      <div>
        <button class="speak-btn" onclick="speak('${item.te}')">🔊</button>
      </div>
      <div class="prompt" style="margin-top:16px">點擊上方按鈕聽發音，然後大聲跟讀 3 遍</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
        <button onclick="this.style.background='var(--success)';this.style.color='#fff';this.textContent='✓ 第1遍'" style="padding:8px 16px;border:2px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer">第 1 遍</button>
        <button onclick="this.style.background='var(--success)';this.style.color='#fff';this.textContent='✓ 第2遍'" style="padding:8px 16px;border:2px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer">第 2 遍</button>
        <button onclick="this.style.background='var(--success)';this.style.color='#fff';this.textContent='✓ 第3遍'" style="padding:8px 16px;border:2px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer">第 3 遍</button>
      </div>
    </div>`;

  document.getElementById('controlBar').innerHTML = `
    <button class="btn-prev" onclick="prevCard()" ${idx === 0 ? 'disabled' : ''}>⬅ 上一個</button>
    <button class="btn-next" onclick="nextCard()">下一個 ➡</button>`;
}

// ==================== ACTIONS ====================
function switchLesson(i) {
  currentLesson = i;
  cardIndex = 0;
  revealed = false;
  quizScore = 0;
  quizTotal = 0;
  quizAnswered = false;
  shuffled = false;
  vocabOrder = lessons[i].vocab.map((_, idx) => idx);
  renderNav();
  render();
}

function switchMode(m) {
  currentMode = m;
  cardIndex = 0;
  revealed = false;
  quizScore = 0;
  quizTotal = 0;
  quizAnswered = false;
  renderModes();
  render();
}

function render() {
  if (currentMode === 'flash') renderFlashcard();
  else if (currentMode === 'dialog') renderDialogue();
  else if (currentMode === 'quiz') renderQuiz();
  else if (currentMode === 'listen') renderListen();
}

function flipCard() { revealed = !revealed; render(); }
function nextCard() { cardIndex++; revealed = false; render(); }
function prevCard() { if (cardIndex > 0) cardIndex--; revealed = false; render(); }

function toggleShuffle() {
  shuffled = !shuffled;
  if (shuffled) {
    vocabOrder = lessons[currentLesson].vocab.map((_, i) => i);
    for (let i = vocabOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [vocabOrder[i], vocabOrder[j]] = [vocabOrder[j], vocabOrder[i]];
    }
  } else {
    vocabOrder = lessons[currentLesson].vocab.map((_, i) => i);
  }
  cardIndex = 0;
  revealed = false;
  render();
}

function checkQuiz(el, selected, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  quizTotal++;
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => {
    if (o.textContent.trim() === correct) o.classList.add('correct');
  });
  if (selected === correct) {
    quizScore++;
    el.classList.add('correct');
    document.getElementById('quizResult').innerHTML = '✅ 正確！';
  } else {
    el.classList.add('wrong');
    document.getElementById('quizResult').innerHTML = `❌ 答案是：${correct}`;
  }
  document.getElementById('nextQuizBtn').disabled = false;
  document.getElementById('statsBar').innerHTML = `<span>答對 ${quizScore} / ${quizTotal}</span><span>正確率 ${Math.round(quizScore/quizTotal*100)}%</span>`;
}

function nextQuiz() {
  quizAnswered = false;
  // Pick random next
  const vocab = lessons[currentLesson].vocab;
  cardIndex = Math.floor(Math.random() * vocab.length);
  render();
}

function toggleAllLines(btn) {
  const dialogue = btn.closest('.dialogue');
  const lines = dialogue.querySelectorAll('.d-line');
  const allShown = [...lines].every(l => l.classList.contains('show'));
  lines.forEach(l => {
    if (allShown) l.classList.remove('show');
    else l.classList.add('show');
  });
}

// ==================== INIT ====================
renderNav();
renderModes();
render();
</script>
